<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Script Manager</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

/* HOME */
#home {
    padding: 12px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
}

h2 {
    font-size: 18px;
    margin: 0;
}

.new-btn {
    background: #22c55e;
    color: white;
    padding: 10px;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    font-size: 14px;
}

/* SCRIPT CARDS */
.card {
    background: #1e293b;
    padding: 12px;
    margin-top: 10px;
    border-radius: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
}

.card-content {
    flex: 1;
}

.card:hover {
    background: #334155;
}

.date {
    font-size: 11px;
    color: #94a3b8;
    margin-top: 3px;
}

/* DELETE */
.delete-btn {
    background: #ef4444;
    color: white;
    border: none;
    padding: 8px 10px;
    border-radius: 8px;
    font-size: 12px;
}

/* EDITOR */
#editor {
    display: none;
    padding: 12px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
    margin-top: 10px;
}

textarea {
    width: 100%;
    height: 60vh;
    margin-top: 10px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
    resize: none;
}

/* ACTION BUTTONS */
.actions {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

.save {
    flex: 1;
    background: #3b82f6;
    color: white;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-weight: bold;
}

.back {
    flex: 1;
    background: #ef4444;
    color: white;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-weight: bold;
}
</style>

</head>
<body>

<!-- HOME -->
<div id="home">
    <div class="header">
        <h2>🎬 My Scripts</h2>
        <button class="new-btn" onclick="createNew()">+ New</button>
    </div>

    <div id="list"></div>
</div>

<!-- EDITOR -->
<div id="editor">
    <h2 style="font-size:18px;">✏️ Script Editor</h2>

    <input id="title" placeholder="Script title...">
    <textarea id="content" placeholder="Write your script..."></textarea>

    <div class="actions">
        <button class="save" onclick="saveScript()">Save</button>
        <button class="back" onclick="goHome()">Back</button>
    </div>
</div>

<script>
let scripts = JSON.parse(localStorage.getItem("scripts")) || [];
let currentId = null;

function renderList() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    scripts.forEach((s, i) => {
        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <div class="card-content" onclick="openScript(${i})">
                <b>${s.title || "Untitled Script"}</b>
                <div class="date">📅 ${s.date}</div>
            </div>
            <button class="delete-btn" onclick="deleteScript(event, ${i})">🗑</button>
        `;

        list.appendChild(div);
    });
}

function createNew() {
    currentId = null;
    document.getElementById("title").value = "";
    document.getElementById("content").value = "";
    showEditor();
}

function openScript(i) {
    currentId = i;
    document.getElementById("title").value = scripts[i].title;
    document.getElementById("content").value = scripts[i].content;
    showEditor();
}

function saveScript() {
    let title = document.getElementById("title").value;
    let content = document.getElementById("content").value;
    let now = new Date().toLocaleString();

    if (currentId === null) {
        scripts.push({ title, content, date: now });
    } else {
        scripts[currentId].title = title;
        scripts[currentId].content = content;
    }

    localStorage.setItem("scripts", JSON.stringify(scripts));
    goHome();
}

function deleteScript(event, i) {
    event.stopPropagation();
    if (confirm("Delete this script?")) {
        scripts.splice(i, 1);
        localStorage.setItem("scripts", JSON.stringify(scripts));
        renderList();
    }
}

function showEditor() {
    document.getElementById("home").style.display = "none";
    document.getElementById("editor").style.display = "block";
}

function goHome() {
    document.getElementById("home").style.display = "block";
    document.getElementById("editor").style.display = "none";
    renderList();
}

renderList();
</script>

</body>
</html>
