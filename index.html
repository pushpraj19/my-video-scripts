<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Script Manager</title>
    <link rel="apple-touch-icon" href="File_00000000c7b061f88243d4b7886a9f4d.png">
    <link rel="icon" type="image/png" href="File_00000000c7b061f88243d4b7886a9f4d.png">
<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* NAVBAR */
nav {
    background: #1e293b;
    padding: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* Flexbox wrapper to align logo and text horizontally */
.nav-title-container {
    display: flex;
    align-items: center;
    gap: 10px;
}

/* Styled logo image */
.nav-logo {
    height: 32px; /* Adjust height to fit nicely in the navbar */
    width: auto;
    object-fit: contain;
}

nav h1 {
    font-size: 16px;
    margin: 0;
}

nav button {
    background: #22c55e;
    border: none;
    padding: 8px 12px;
    border-radius: 8px;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

/* MAIN */
main {
    flex: 1;
    padding: 12px;
}

/* HOME LIST */
.card {
    background: #1e293b;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
}

.card-content {
    flex: 1;
}

.date {
    font-size: 11px;
    color: #94a3b8;
}

.delete-btn {
    background: #ef4444;
    border: none;
    padding: 6px 10px;
    border-radius: 8px;
    color: white;
    cursor: pointer;
}

/* EDITOR */
#editor {
    display: none;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
    box-sizing: border-box;
}

textarea {
    width: 100%;
    height: 60vh;
    margin-top: 10px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
    box-sizing: border-box;
    resize: none;
}

/* BUTTONS */
.actions {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

.save {
    flex: 1;
    background: #3b82f6;
    border: none;
    padding: 12px;
    border-radius: 10px;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.back {
    flex: 1;
    background: #ef4444;
    border: none;
    padding: 12px;
    border-radius: 10px;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

/* FOOTER */
footer {
    background: #1e293b;
    text-align: center;
    padding: 10px;
    font-size: 12px;
    color: #94a3b8;
}
</style>

</head>
<body>

<nav>
    <div class="nav-title-container">
        <img src="file_00000000948461f98fadb9fa85d379ca.png" alt="Logo" class="nav-logo">
        <h1>Script Manager</h1>
    </div>
    <button onclick="createNew()">+ New</button>
</nav>

<main>

<div id="home">
    <h3>My Scripts</h3>
    <div id="list"></div>
</div>

<div id="editor">
    <h3>✏️ Editor</h3>

    <input id="title" placeholder="Script title...">
    <textarea id="content" placeholder="Write your script..."></textarea>

    <div class="actions">
        <button class="save" onclick="saveScript()">Save</button>
        <button class="back" onclick="goHome()">Back</button>
    </div>
</div>

</main>

<footer>
    Made for your video scripts 🎬 | Saved in browser storage
</footer>

<script>
let scripts = JSON.parse(localStorage.getItem("scripts")) || [];
let currentId = null;

/* RENDER */
function renderList() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    scripts.forEach((s, i) => {
        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <div class="card-content" onclick="openScript(${i})">
                <b>${s.title || "Untitled Script"}</b>
                <div class="date">📅 ${s.date}</div>
            </div>
            <button class="delete-btn" onclick="deleteScript(event, ${i})">🗑</button>
        `;

        list.appendChild(div);
    });
}

/* NEW */
function createNew() {
    currentId = null;
    document.getElementById("title").value = "";
    document.getElementById("content").value = "";
    showEditor();
}

/* OPEN */
function openScript(i) {
    currentId = i;
    document.getElementById("title").value = scripts[i].title;
    document.getElementById("content").value = scripts[i].content;
    showEditor();
}

/* SAVE */
function saveScript() {
    let title = document.getElementById("title").value;
    let content = document.getElementById("content").value;
    let now = new Date().toLocaleString();

    if (currentId === null) {
        scripts.push({ title, content, date: now });
    } else {
        scripts[currentId].title = title;
        scripts[currentId].content = content;
    }

    localStorage.setItem("scripts", JSON.stringify(scripts));
    goHome();
}

/* DELETE */
function deleteScript(event, i) {
    event.stopPropagation();
    if (confirm("Delete this script?")) {
        scripts.splice(i, 1);
        localStorage.setItem("scripts", JSON.stringify(scripts));
        renderList();
    }
}

/* NAV */
function showEditor() {
    document.getElementById("home").style.display = "none";
    document.getElementById("editor").style.display = "block";
}

function goHome() {
    document.getElementById("home").style.display = "block";
    document.getElementById("editor").style.display = "none";
    renderList();
}

renderList();
</script>

</body>
</html>
